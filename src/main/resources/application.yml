spring:
  application:
    name: SensitiveWordsService
  profiles:
    active: dev
  jackson:
    default-property-inclusion: NON_NULL
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /openapi.yml